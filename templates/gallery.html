{% extends "base.html" %}

{% block seo %}
  <meta property="og:title" content="{{ t.nav_gallery }} · {{ t.app_title }}">
  <meta property="og:description" content="{{ t.gallery_desc }}">
  <meta name="twitter:title" content="{{ t.nav_gallery }} · {{ t.app_title }}">
  <meta name="twitter:description" content="{{ t.gallery_desc }}">
{% endblock %}

{% block content %}
<section class="card tilt-card">
  <h1 class="card-title">{{ t.nav_gallery }}</h1>
  <p class="summary">{{ t.gallery_desc }}</p>

  <div class="gallery-grid">
    {% for h in hex_list %}
      <a href="{{ url_for('cast_hex', hex_code=h.code, lang=lang) }}" class="gallery-item">
        <img src="{{ url_for('static', filename='gua/' ~ h.code ~ '.png') }}" alt="{{ h.name[lang] }}" loading="lazy">
        <div class="hex-num">{{ '%02d' % h.no }}</div>
        <div class="hex-name">{{ h.name[lang] }}</div>
        <div class="hex-meaning">{{ h.meaning[lang][:20] }}{% if h.meaning[lang]|length > 20 %}…{% endif %}</div>
      </a>
    {% endfor %}
  </div>
</section>
{% endblock %}
