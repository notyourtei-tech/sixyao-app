{% extends "base.html" %}

{% block content %}
<style>
  .welcome-overlay {
    position: fixed; inset: 0;
    background: var(--bg-deep);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    opacity: 1; transition: opacity 0.4s ease;
  }
  .welcome-overlay.hidden { opacity: 0; pointer-events: none; }

  .welcome-card {
    width: 100%; max-width: 520px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }

  .wc-header {
    text-align: center;
    padding: 40px 32px 28px;
    background: linear-gradient(180deg, rgba(212,168,67,0.08) 0%, transparent 100%);
  }
  .wc-icon { font-size: 56px; margin-bottom: 12px; opacity: 0.12; color: var(--gold); }
  .wc-title {
    font-family: var(--font-serif);
    font-size: 26px; font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
  }
  .wc-sub { font-size: 13px; color: var(--text-muted); }

  .wc-body { padding: 0 32px 32px; }

  .panel { display: none; }
  .panel.active { display: block; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .lang-label {
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    letter-spacing: 0.08em; text-transform: uppercase;
    text-align: center; margin-bottom: 16px;
  }
  .lang-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .lang-option {
    padding: 14px 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-deep);
    cursor: pointer; text-align: center;
    transition: all 0.2s ease;
    color: var(--text-secondary);
  }
  .lang-option:hover {
    border-color: var(--gold);
    background: rgba(212,168,67,0.06);
    transform: translateY(-1px);
  }
  .lang-flag { font-size: 28px; display: block; margin-bottom: 4px; }
  .lang-name { font-size: 13px; font-weight: 500; }
  .lang-native { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 24px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border);
    transition: all 0.3s ease;
  }
  .dot.on { background: var(--gold); width: 22px; border-radius: 4px; }

  .step-num {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--gold);
    letter-spacing: 0.1em; text-align: center; margin-bottom: 10px;
  }
  .step-title {
    font-family: var(--font-serif);
    font-size: 20px; font-weight: 600;
    color: var(--text-primary);
    text-align: center; margin-bottom: 14px;
  }
  .step-desc {
    font-size: 13.5px; color: var(--text-secondary);
    line-height: 1.85; white-space: pre-line;
    text-align: center;
  }

  .btns { display: flex; justify-content: center; gap: 10px; margin-top: 28px; }
  .b-prev {
    padding: 10px 22px; border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent; color: var(--text-secondary);
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all 0.2s ease;
  }
  .b-prev:hover { border-color: var(--text-muted); color: var(--text-primary); }
  .b-next {
    padding: 10px 28px; border-radius: 999px;
    border: none; background: var(--gold);
    color: var(--bg-deep);
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.2s ease;
  }
  .b-next:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(212,168,67,0.3); }

  .skip {
    display: block; text-align: center;
    margin-top: 14px; font-size: 12px;
    color: var(--text-muted);
    text-decoration: none; cursor: pointer;
    transition: color 0.2s ease; border: none; background: none;
  }
  .skip:hover { color: var(--text-secondary); }

  @media (max-width: 520px) {
    .wc-body { padding: 0 20px 24px; }
    .lang-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .lang-option { padding: 12px 8px; }
  }
</style>

<div class="welcome-overlay" id="wo">
  <div class="welcome-card">
    <div class="wc-header">
      <div class="wc-icon">&#x2642;</div>
      <h1 class="wc-title" id="wcTitle">{{ wt.title }}</h1>
      <p class="wc-sub">{{ t.app_title }}</p>
    </div>
    <div class="wc-body">

      <!-- Panel 1: Language Selection -->
      <div class="panel active" id="p1">
        <div class="lang-label" id="langLabel">{{ wt.lang_title }}</div>
        <div class="lang-grid">
          {% for code, name, native, flag in lang_options %}
          <button class="lang-option" onclick="pickLang('{{ code }}')">
            <span class="lang-flag">{{ flag }}</span>
            <span class="lang-name">{{ name }}</span>
            <span class="lang-native">{{ native }}</span>
          </button>
          {% endfor %}
        </div>
        <button class="skip" onclick="skipAll()" id="skipLang">{{ wt.btn_start }}</button>
      </div>

      <!-- Panel 2: Guide Steps -->
      <div class="panel" id="p2">
        <div class="dots">
          <div class="dot on" id="d1"></div>
          <div class="dot" id="d2"></div>
          <div class="dot" id="d3"></div>
        </div>
        <div class="step-num" id="sNum"></div>
        <h2 class="step-title" id="sTitle"></h2>
        <p class="step-desc" id="sDesc"></p>
        <div class="btns">
          <button class="b-prev" id="bPrev" onclick="prev()" style="visibility:hidden"></button>
          <button class="b-next" id="bNext" onclick="next()"></button>
        </div>
        <button class="skip" onclick="goMain()" id="skipGuide"></button>
      </div>

    </div>
  </div>
</div>

<script>
var W = {{ welcome_json|safe }};
var sel = null, step = 1, total = 3;

function pickLang(code) {
  sel = code;
  var w = W[code] || W.en;
  document.getElementById('p1').classList.remove('active');
  document.getElementById('p2').classList.add('active');
  document.getElementById('wcTitle').textContent = w.title;
  document.getElementById('skipGuide').textContent = w.btn_start;
  document.getElementById('bPrev').textContent = '';
  document.getElementById('bNext').textContent = w.btn_start;
  step = 1;
  updateStep(w);
}

function updateStep(w) {
  w = w || W[sel] || W.en;
  var dots = document.querySelectorAll('.dot');
  dots.forEach(function(d, i) { d.className = 'dot' + (i + 1 === step ? ' on' : ''); });
  document.getElementById('sNum').textContent = 'STEP ' + step;
  document.getElementById('sTitle').textContent = w['step' + step + '_title'] || '';
  document.getElementById('sDesc').textContent = w['step' + step + '_desc'] || '';
  document.getElementById('bPrev').style.visibility = step === 1 ? 'hidden' : 'visible';
  var nb = document.getElementById('bNext');
  if (step === total) {
    nb.textContent = w.btn_start;
    nb.onclick = goMain;
  } else {
    nb.textContent = '';
    nb.onclick = function() { step++; updateStep(w); };
  }
}

function prev() { if (step > 1) { step--; updateStep(); } }
function next() { if (step < total) { step++; updateStep(w); } }

function goMain() {
  if (!sel) sel = 'en';
  localStorage.setItem('sy_lang', sel);
  window.location.href = '/?lang=' + sel;
}

function skipAll() { sel = 'en'; goMain(); }

(function() {
  var saved = localStorage.getItem('sy_lang');
  if (saved && W[saved]) { sel = saved; goMain(); }
})();
</script>
{% endblock %}
