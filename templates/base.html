<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#d4a843">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="{{ t.app_title }}">
  <meta name="description" content="{{ t.seo_description | default('Six Yao Divination - Ancient Chinese I Ching prediction method with 6 languages support') }}">
  <meta property="og:title" content="{{ t.app_title }}">
  <meta property="og:description" content="{{ t.seo_description | default('Six Yao Divination - Ancient Chinese I Ching prediction method with 6 languages support') }}">
  <meta property="og:type" content="website">
  <meta property="og:image" content="{{ url_for('static', filename='gua/0.png', _external=True) }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ t.app_title }}">
  <meta name="twitter:description" content="{{ t.seo_description | default('Six Yao Divination - Ancient Chinese I Ching prediction method') }}">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='gua/0.png') }}">
  <title>{{ t.app_title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header class="top-bar">
  <a href="{{ url_for('index', lang=lang) }}" class="logo">{{ t.app_title }}</a>
  <nav class="main-nav">
    <a href="{{ url_for('index', lang=lang) }}" class="nav-link">{{ t.nav_home }}</a>
    <a href="{{ url_for('history', lang=lang) }}" class="nav-link">{{ t.nav_history }}</a>
    <a href="{{ url_for('starred', lang=lang) }}" class="nav-link">{{ t.nav_starred | default('Starred') }}</a>
    <a href="{{ url_for('gallery', lang=lang) }}" class="nav-link">{{ t.nav_gallery | default('Atlas') }}</a>
    <a href="{{ url_for('stats', lang=lang) }}" class="nav-link">{{ t.nav_stats | default('Stats') }}</a>
  </nav>
  <div class="lang-switch">
    <button onclick="localStorage.removeItem('sy_lang');window.location.href='/'" title="{{ t.guide_title | default('教程') }}" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:14px;color:var(--text-muted);transition:all 0.2s ease;">?</button>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="{{ t.theme_toggle | default('切换主题') }}" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:14px;color:var(--text-muted);transition:all 0.2s ease;">&#9790;</button>
    <a href="{{ lang_urls['zh'] }}" class="lang-btn {% if lang == 'zh' %}active{% endif %}">中</a>
    <a href="{{ lang_urls['ja'] }}" class="lang-btn {% if lang == 'ja' %}active{% endif %}">日</a>
    <a href="{{ lang_urls['en'] }}" class="lang-btn {% if lang == 'en' %}active{% endif %}">EN</a>
    <a href="{{ lang_urls['vi'] }}" class="lang-btn {% if lang == 'vi' %}active{% endif %}">VI</a>
    <a href="{{ lang_urls['ko'] }}" class="lang-btn {% if lang == 'ko' %}active{% endif %}">한</a>
    <a href="{{ lang_urls['my'] }}" class="lang-btn {% if lang == 'my' %}active{% endif %}">မြန်မာ</a>
  </div>
</header>

<main class="page">
  {% block content %}{% endblock %}
</main>

<!-- WeChat / In-App Browser Warning -->
<div id="wechatWarning" style="display:none;position:fixed;inset:0;background:rgba(8,8,12,0.95);z-index:99999;display:flex;align-items:center;justify-content:center;">
  <div style="background:var(--bg-surface,#1a1a24);border:1px solid var(--border,#2a2a3a);border-radius:16px;padding:36px 28px;max-width:380px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
    <div style="font-size:48px;margin-bottom:16px;">&#x1F517;</div>
    <h2 id="wcTitle" style="font-family:var(--font-serif);font-size:20px;color:var(--text-primary);margin-bottom:12px;"></h2>
    <p id="wcDesc" style="font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:20px;"></p>
    <div id="wcSteps" style="text-align:left;background:var(--bg-deep,#0e0e14);border-radius:10px;padding:16px;margin-bottom:20px;">
      <div id="wcStep1" style="font-size:13px;color:var(--text-secondary);line-height:1.8;"></div>
    </div>
    <button onclick="document.getElementById('wechatWarning').style.display='none'" id="wcClose" style="padding:10px 28px;border-radius:999px;border:none;background:var(--gold,#d4a843);color:var(--bg-deep,#0e0e14);font-size:14px;font-weight:600;cursor:pointer;"></button>
  </div>
</div>
</body>
<script>
(function() {
  var saved = localStorage.getItem('theme') || 'dark';
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    var btn = document.getElementById('themeToggle');
    if (btn) btn.innerHTML = '&#9788;';
  }
})();

function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme');
  var next = current === 'light' ? null : 'light';
  if (next) {
    document.documentElement.setAttribute('data-theme', 'light');
    localStorage.setItem('theme', 'light');
    document.getElementById('themeToggle').innerHTML = '&#9788;';
  } else {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('theme', 'dark');
    document.getElementById('themeToggle').innerHTML = '&#9790;';
  }
}
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js').catch(function() {});
}
</script>
<script>
(function() {
  var ua = navigator.userAgent || '';
  var isWeChat = /MicroMessenger/i.test(ua);
  var isQQ = /QQ/i.test(ua) && !/MicroMessenger/i.test(ua);
  var isInApp = isWeChat || isQQ || /DingTalk|Weibo|Alipay|Douyin|TikTok/i.test(ua);

  if (!isInApp) return;

  var lang = '{{ lang }}';
  var texts = {
    zh: { title: '请在浏览器中打开', desc: '当前在微信/QQ等应用内置浏览器中打开，部分功能可能受限。建议使用系统浏览器访问以获得完整体验。', step: '1. 点击右上角 <b>⋯</b> 按钮<br>2. 选择 <b>在浏览器中打开</b>', btn: '我知道了' },
    ja: { title: 'ブラウザで開いてください', desc: '微信やQQなどのアプリ内ブラウザでは、一部の機能が制限される場合があります。システムブラウザで開くことをお勧めします。', step: '1. 右上の <b>⋯</b> ボタンをタップ<br>2. <b>ブラウザで開く</b> を選択', btn: '了解しました' },
    en: { title: 'Open in Browser', desc: 'This page was opened in WeChat/QQ in-app browser. Some features may be limited. Please open in your system browser for the full experience.', step: '1. Tap the <b>⋯</b> button at the top right<br>2. Select <b>Open in Browser</b>', btn: 'Got it' },
    vi: { title: 'Mở trong trình duyệt', desc: 'Trang này đang được mở trong trình duyệt tích hợp của WeChat/QQ. Một số tính năng có thể bị hạn chế. Hãy mở trong trình duyệt hệ thống để có trải nghiệm đầy đủ.', step: '1. Nhấn nút <b>⋯</b> ở góc trên bên phải<br>2. Chọn <b>Mở trong trình duyệt</b>', btn: 'Đã hiểu' },
    ko: { title: '브라우저에서 열어주세요', desc: '微信/QQ 인앱 브라우저에서 열렸습니다. 일부 기능이 제한될 수 있습니다. 시스템 브라우저에서 열어주세요.', step: '1. 오른쪽 상단의 <b>⋯</b> 버튼을 누르세요<br>2. <b>브라우저에서 열기</b>를 선택하세요', btn: '알겠습니다' },
    my: { title: 'ဘရောင်ဇာဖြင့် ဖွင့်ပါ', desc: 'WeChat/QQ အက်ပ်အတွင်း ဘရောင်ဇာဖြင့် ဖွင့်ထားပါသည်။ အင်္ဂါရပ်အချို့ ကန့်သတ်ထားနိုင်ပါသည်။ အပြည့်အဝအသုံးပြုရန် စနစ်ဘရောင်ဇာဖြင့် ဖွင့်ပါ။', step: '၁။ ညာဘက်အပေါ်ခြမ်းရှိ <b>⋯</b> ခလုတ်ကို နှိပ်ပါ<br>၂။ <b>ဘရောင်ဇာဖြင့် ဖွင့်ရန်</b> ကို ရွေးပါ', btn: 'နားလည်ပါပြီ' }
  };
  var t = texts[lang] || texts.en;

  document.getElementById('wcTitle').textContent = t.title;
  document.getElementById('wcDesc').textContent = t.desc;
  document.getElementById('wcStep1').innerHTML = t.step;
  document.getElementById('wcClose').textContent = t.btn;
  document.getElementById('wechatWarning').style.display = 'flex';
})();
</script>
</html>
